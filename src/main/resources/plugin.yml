name: ArisCore
version: 1.1
main: me.vennlmao.ariscore.ArisCore
api-version: '1.21'
folia-supported: true
authors:
  - vennlmao
softdepend:
  - Vault
  - PlaceholderAPI
  - WorldGuard
  - WorldEdit
  - LuckPerms

commands:
  tpa:
    description: Send a teleport request
    usage: /tpa <player>
  tpahere:
    description: Send a tpahere request
    usage: /tpahere <player>
  tpaccept:
    description: Accept a teleport request
    usage: /tpaccept
  tpacancel:
    description: Cancel your teleport request
    usage: /tpacancel
  tpadeny:
    description: Deny an incoming teleport request
    usage: /tpadeny
  tpauto:
    description: Toggle auto-accept
    usage: /tpauto
  tpatoggle:
    description: Toggle receiving tpa
    usage: /tpatoggle
  tpaheretoggle:
    description: Toggle receiving tpahere
    usage: /tpaheretoggle
  homes:
    description: Open homes GUI
    usage: /homes
  home:
    description: Teleport to a home
    usage: /home <name>
  sethome:
    description: Set a home
    usage: /sethome <name>
  delhome:
    description: Delete a home
    usage: /delhome <name>
  shop:
    description: Open the shop
    usage: /shop
  shards:
    description: Manage shards
    usage: /shards <give|take|reset> <player|all> [amount]
    aliases: [shard]
  team:
    description: Team management
    usage: /team [create|disband|invite|join|leave|kick|sethome|delhome|home|chat|info|reload]
  scoreboardtoggle:
    description: Bật/tắt scoreboard
    usage: /scoreboardtoggle
  ah:
    description: Auction House
    usage: /ah [search] | /ah sell <price>
  auction:
    description: Auction House
    usage: /auction [search] | /auction sell <price>
  ariscore:
    description: ArisCore admin command
    usage: /ariscore reload [module]
    
