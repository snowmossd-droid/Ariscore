tab:
  enabled: true
  update-tick: 2
  default:
    header:
      - ''
      - '#00ADFC&lArisSMP#00ADFC'
      - '&f%server_online% Players'
      - ''
    footer:
      - ''
      - '   #37BFF9/ᴅɪꜱᴄᴏʀᴅ  /ɢᴜɪᴅᴇ  /ꜱᴛᴏʀᴇ   '
      - ''

luckperms-name:
  enabled: true
  format: '%luckperms_prefix%%player_name%%luckperms_suffix%'

luckperms-sorting:
  enabled: true
  groups:
    - 'owner'
    - 'admin'
    - 'mod'
    - 'helper'
    - 'builder'
    - 'vip'
    - 'default'

belowname:
  enabled: true
  title: '&c❤'

scoreboard:
  update-tick: 2
  team-line:
    format: '#00A4FC🪓 &fTeam #00A4FC%ariscore_team%'
  default:
    title: '  #007CF9&lArisSMP#00C6F9  '
    lines:
      - ''
      - '#00FC00$ &fMoney #00FC00%vault_eco_balance_formatted%'
      - '#A303F9★ &fShards #A303F9%ariscore_shards%'
      - '#FC0000🗡 &fKills #FC0000%statistic_player_kills%'
      - '#F97603☠ &fDeaths #F97603%statistic_deaths%'
      - '#00A4FC⌛ &fKeyall #00A4FCNo'
      - '#FCE300⌚ &fPlaytime &#FCE300%statistic_hours_played%h %statistic_time_played:minutes%m'
      - '{team}'
      - ''
      - '#A8A8A8Europe (#00A4FC%player_ping%#A8A8A8)'
  worlds:
    rtpqueue:
      world: 'rtpqueue'
      title: '  &cRTPQUEUE  '
      lines:
        - ''
        - '#FC0000🗡 &fKills #FC0000%donutstats_kills%'
        - '#F97603☠ &fDeaths #F97603%donutstats_deaths%'
        - '{team}'
        - ''
        - '#A8A8A8Europe (#00A4FC%player_ping%#A8A8A8)'

sounds:
  tabtoggle_enabled:
    sound: 'UI_BUTTON_CLICK'
    volume: 1.0
    pitch: 1.2
  tabtoggle_disabled:
    sound: 'UI_BUTTON_CLICK'
    volume: 1.0
    pitch: 0.8

messages:
  tabtoggle_enabled: '#00FC00Scoreboard đã bật.'
  tabtoggle_enabled_ab: '#00FC00✔ Scoreboard bật'
  tabtoggle_disabled: '#FC0000Scoreboard đã tắt.'
  tabtoggle_disabled_ab: '#FC0000✘ Scoreboard tắt'
