max_homes_default: 1

permission-slots:
  arishomes.homes.1: 1
  arishomes.homes.2: 2
  arishomes.homes.3: 3
  arishomes.homes.4: 4
  arishomes.homes.5: 5

mysql:
  enabled: false
  host: "host"
  port: 3306
  database: "database"
  username: "username"
  password: "password"
  table-prefix: "arishomes_"
  use-ssl: false

sqlite:
  enabled: true

blocked_worlds:
  - world_nether
  - world_the_end

sounds:
  teleport_success:
    sound: ENTITY_ENDERMAN_TELEPORT
    volume: 1.0
    pitch: 1.0
  sethome:
    sound: BLOCK_NOTE_BLOCK_PLING
    volume: 1.0
    pitch: 1.5
  deletehome:
    sound: BLOCK_NOTE_BLOCK_BASS
    volume: 1.0
    pitch: 0.5
  error:
    sound: ENTITY_VILLAGER_NO
    volume: 1.0
    pitch: 1.0
  click:
    sound: UI_BUTTON_CLICK
    volume: 1.0
    pitch: 1.0

messages:
  sethome: "&aHome &f%home% &aset successfully."
  sethome_ab: "&aHome set!"
  deletehome: "&cHome &f%home% &cdeleted."
  deletehome_ab: "&cHome deleted!"
  teleport_success: "&aTeleported to &f%home%&a."
  teleport_success_ab: "&aTeleported!"
  world_blocked: "&cThe world doesn't allow sethome."
  world_blocked_ab: "&cSethome not allowed here."
  world_not_found: "&cWorld not found."
  world_not_found_ab: "&cWorld not found."
  home_not_exist: "&cHome does not exist."
  home_not_exist_ab: "&cHome does not exist."
  teleport_cancelled_moved: "&cTeleport cancelled because you moved!"
  teleport_cancelled_moved_ab: "&cTeleport cancelled! You moved."
  teleport_cancelled_damaged: "&cTeleport cancelled because you took damage!"
  teleport_cancelled_damaged_ab: "&cTeleport cancelled! You took damage."
  max_homes_reached: "&cYou have reached the maximum number of homes."
  max_homes_reached_ab: "&cMax homes reached."
  home_already_exists: "&cHome &f%home% &calready exists."
  home_already_exists_ab: "&cHome already exists."

gui:
  title: "&8ʜᴏᴍᴇꜱ"
  size: 36
  slots:
    beds: "11,12,13,14,15"
    dyes: "20,21,22,23,24"
  home-set:
    bed:
      slot: 0
      material: "LIGHT_BLUE_BED"
      name: "&#0044FCʜᴏᴍᴇ %home%"
      lore:
        - "&fClick to teleport"
    dye:
      slot: 0
      material: "BLUE_DYE"
      name: "&#0044FCʜᴏᴍᴇ %home%"
      lore:
        - "&fClick to delete"
  home-not-set:
    bed:
      slot: 0
      material: "LIGHT_GRAY_BED"
      name: "&7ɴᴏ ʜᴏᴍᴇ ꜱᴇᴛ"
      lore:
        - "&fClick to save your location"
    dye:
      slot: 0
      material: "GRAY_DYE"
      name: "&7ɴᴏ ʜᴏᴍᴇ ꜱᴇᴛ"
      lore:
        - "&fClick to save your location"
  no-permission:
    bed:
      slot: 0
      material: "RED_BED"
      name: "&#FF0000ɴᴏ ᴘᴇʀᴍɪꜱꜱɪᴏɴ"
      lore:
        - "&fBuy &#0044FCDonut+ &fin /store for more homes"
    dye:
      slot: 0
      material: "RED_DYE"
      name: "&#FF0000ɴᴏ ᴘᴇʀᴍɪꜱꜱɪᴏɴ"
      lore:
        - "&fBuy &#0044FCDonut+ &fin /store for more homes"

gui-confirm-delete:
  title: "&8Confirm Delete"
  size: 27
  items:
    home-info:
      slot: 13
      material: "BLUE_DYE"
      name: "&#0044FCʜᴏᴍᴇ %home%"
      lore: []
    cancel:
      slot: 11
      material: "RED_STAINED_GLASS_PANE"
      name: "&#FF0000ᴄᴀɴᴄᴇʟ"
      lore:
        - "&fClick to cancel"
    confirm:
      slot: 15
      material: "LIME_STAINED_GLASS_PANE"
      name: "&#0bf52bᴄᴏɴꜰʀɪᴍ"
      lore:
        - "&fClick to delete"

warmup: 3
cancel_distance: 0.1

  teleporting_chat: "&eTeleporting to &f%home% &ein &f{seconds}s&e... Don't move!"
  teleporting_ab: "&eTeleporting to &f%home% &ein &f{seconds}s&e... Don't move!"

  countdown:
    sound: BLOCK_NOTE_BLOCK_HAT
    volume: 1.0
    pitch: 1.2
