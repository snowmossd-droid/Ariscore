shards:
  placeholder: '%aris_shards%'
  take_command: 'shards take {player} {amount}'

messages:
  purchase:
    money: "&cBạn không đủ tiền."
    money_ab: "&cBạn không đủ tiền."
    shards: "&cBạn không đủ mảnh."
    shards_ab: "&cBạn không đủ mảnh."
    inventory_full: "&cTúi đồ của bạn đã đầy."
    inventory_full_ab: "&cTúi đồ của bạn đã đầy."

gui:
  title: "cửᴀ ʜàɴɢ"
  size: 27
  categories:
    food:
      slot: 14
      material: COOKED_BEEF
      name: '#00F986ғᴏᴏᴅ'
      lore:
        - '&fNhấn để xem cửa hàng thực phẩm'
    gear:
      slot: 13
      material: TOTEM_OF_UNDYING
      name: '#00F986ɢᴇᴀʀ'
      lore:
        - '&fNhấn để xem cửa hàng trang bị'
    nether:
      slot: 12
      material: NETHERRACK
      name: '#00F986ɴᴇᴛʜᴇʀ'
      lore:
        - '&fNhấn để xem cửa hàng địa ngục'
    shards:
      slot: 15
      material: AMETHYST_SHARD
      name: '#00F986sʜᴀʀᴅs'
      lore:
        - '&fNhấn để xem cửa hàng mảnh vụn'
    end:
      slot: 11
      material: END_STONE
      name: '#00F986ᴇɴᴅ'
      lore:
        - '&fNhấn để xem cửa hàng End'

gui-back:
  back:
    slot: 18
    material: "RED_STAINED_GLASS_PANE"
    name: "#FC0000ᴛʀở ʟạɪ"
    lore:
      - "&fNhấn để quay lại"

gui-purchase:
  title: "ᴍᴜᴀ {currentItem}"
  size: 27
  confirm:
    slot: 23
    material: "LIME_STAINED_GLASS_PANE"
    name: "#00FC00xáᴄ ɴʜậɴ"
  cancel:
    slot: 21
    material: "RED_STAINED_GLASS_PANE"
    name: "#FC0000ʜủʏ"
  remove:
    max:
      slot: 9
      material: "RED_STAINED_GLASS_PANE"
      name: "&cGiảm {maxAmount}"
    ten:
      slot: 10
      material: "RED_STAINED_GLASS_PANE"
      name: "&cGiảm 10"
    one:
      slot: 11
      material: "RED_STAINED_GLASS_PANE"
      name: "&cGiảm 1"
  add:
    one:
      slot: 15
      material: "LIME_STAINED_GLASS_PANE"
      name: "&aThêm 1"
    ten:
      slot: 16
      material: "LIME_STAINED_GLASS_PANE"
      name: "&aThêm 10"
    max:
      slot: 17
      material: "LIME_STAINED_GLASS_PANE"
      name: "&aĐặt thành {maxAmount}"
  display_money:
    slot: 13
    material: "{currentItemMaterial}"
    name: "&f{currentItem}"
    lore:
      - "&7Số lượng: &f{amount}"
      - "&7Giá: &f{moneyprice}"
      - "&7Tổng: &f{totalmoney}"
  display_shards:
    slot: 13
    material: "{currentItemMaterial}"
    name: "&f{currentItem}"
    lore:
      - "&7Số lượng: &f{amount}"
      - "&7Shards: &f{shardsprice}"
      - "&7Tổng shards: &f{totalShards}"

sounds:
  click:
    sound: UI_BUTTON_CLICK
    volume: 1.0
    pitch: 1.0
  no_money:
    sound: ENTITY_VILLAGER_NO
    volume: 1.0
    pitch: 1.0
  no_shards:
    sound: ENTITY_VILLAGER_NO
    volume: 1.0
    pitch: 0.8
  inventory_full:
    sound: BLOCK_NOTE_BLOCK_BASS
    volume: 1.0
    pitch: 0.5
  purchase_success:
    sound: ENTITY_PLAYER_LEVELUP
    volume: 1.0
    pitch: 1.0
