blocked_worlds:
  - world_nether
  - world_the_end

gui:
  main:
    title: "&8ᴛᴇᴀᴍ (Page {page})"
    size: 54

teammate-display:
  online-prefix: '&a❏'
  offline-prefix: '&c❏'
  name-color: '&#34eb9b'
  leader-indicator: ' &6★'
  leader-lore: '&6Team Leader'
  member-lore: '&fClick to edit'

items:
  back:
    slot: 48
    material: ARROW
    display-name: '&#34eb9bʙᴀᴄᴋ'
    lore:
      - '&fClick to go to previous page'
  team-info:
    slot: 49
    material: IRON_HELMET
    display-name: '&#34eb9bᴛᴇᴀᴍ {team-name}'
    lore:
      - '&7Members: &f{count}/{max}'
  next:
    slot: 50
    material: ARROW
    display-name: '&#34eb9bɴᴇxᴛ'
    lore:
      - '&fClick to go to next page'
  team-home:
    slot: 52
    material: WHITE_BANNER
    display-name: '&#34eb9bᴛᴇᴀᴍ ʜᴏᴍᴇ'
    lore:
      - '&fTeleport to team home'
  pvp:
    slot: 53
    material: DIAMOND_SWORD
    display-name: '&#34eb9bᴘᴠᴘ'
    lore:
      - '&fCurrently: {pvp-status}'
    status:
      enabled: '&#34eb9b&lON'
      disabled: '&#FF0000&lOFF'
  empty-member:
    material: GRAY_STAINED_GLASS_PANE
    display-name: '&#34eb9bɪɴᴠɪᴛᴇ'
    lore:
      - '&fClick to invite a new player'
  player-head:
    online-indicator: '&a● Online'
    offline-indicator: '&c● Offline'
    click-lore: '&fClick to manage'

permission-gui:
  title: 'ᴇᴅɪᴛ ᴘᴇʀᴍɪssɪᴏɴs'
  size: 27
  permissions:
    edit-home:
      slot: 10
      material: WHITE_BANNER
      display-name: '&#34eb9bᴇᴅɪᴛ ʜᴏᴍᴇ'
      lore:
        - '&fLet {player-name} set/remove team home'
        - '&fCurrently: {status}'
    kick-player:
      slot: 11
      material: OAK_DOOR
      display-name: '&#34eb9bᴋɪᴄᴋ'
      lore:
        - '&fClick to kick {player-name}'
    manage-teammates:
      slot: 12
      material: IRON_HELMET
      display-name: '&#34eb9bᴋɪᴄᴋ ᴍᴇᴍʙᴇʀs'
      lore:
        - '&fLet {player-name} kick members'
        - '&fCurrently: {status}'
    pvp-toggle:
      slot: 13
      material: IRON_SWORD
      display-name: '&#34eb9bᴘᴠᴘ'
      lore:
        - '&fLet {player-name} toggle team pvp'
        - '&fCurrently: {status}'
    visit-home:
      slot: 14
      material: ENDER_PEARL
      display-name: '&#34eb9bᴠɪsɪᴛ ʜᴏᴍᴇ'
      lore:
        - '&fLet {player-name} go to team home'
        - '&fCurrently: {status}'
    team-chat:
      slot: 15
      material: FEATHER
      display-name: '&#34eb9bᴛᴇᴀᴍ ᴄʜᴀᴛ'
      lore:
        - '&fLet {player-name} use team chat'
        - '&fCurrently: {status}'
    invite-players:
      slot: 16
      material: WRITABLE_BOOK
      display-name: '&#34eb9bɪɴᴠɪᴛᴇ'
      lore:
        - '&fLet {player-name} invite players'
        - '&fCurrently: {status}'
  back-button:
    slot: 18
    material: RED_STAINED_GLASS_PANE
    display-name: '&cʙᴀᴄᴋ'
    lore:
      - '&fClick to return'

kick-confirmation-gui:
  title: 'ᴄᴏɴғɪʀᴍ ᴋɪᴄᴋ'
  size: 27
  cancel:
    slot: 11
    material: RED_STAINED_GLASS_PANE
    display-name: '&#e00202ᴄᴀɴᴄᴇʟ'
    lore:
