blocked_worlds:
  - world_nether
  - world_the_end

gui:
  main:
    title: "&8Team &7{team}"
    size: 54
    items:
      team_home:
        slot: 8
        material: BED
        name: "&6Team Home"
        lore:
          - "&fNhấn để teleport"
      search:
        slot: 0
        material: COMPASS
        name: "&fSearch"
        lore:
          - "&fNhấn để tìm kiếm"
      back:
        slot: 45
        material: RED_STAINED_GLASS_PANE
        name: "&cBack"
        lore:
          - "&fQuay lại"

  edit:
    title: "&8Edit {team}"
    size: 27
    items:
      invite:
        slot: 10
        material: LIME_DYE
        name: "&aInvite"
        lore:
          - "&fMời người chơi"
      kick:
        slot: 12
        material: RED_DYE
        name: "&cKick"
        lore:
          - "&fKick thành viên"
      sethome:
        slot: 14
        material: BED
        name: "&6Set Home"
        lore:
          - "&fĐặt team home"
      delhome:
        slot: 16
        material: BARRIER
        name: "&cDel Home"
        lore:
          - "&fXóa team home"
      disband:
        slot: 22
        material: TNT
        name: "&cDisband"
        lore:
          - "&fGiải tán team"

  confirm_disband:
    title: "&8Confirm Disband"
    size: 27
    items:
      confirm:
        slot: 11
        material: LIME_STAINED_GLASS_PANE
        name: "&aXác nhận"
        lore:
          - "&fGiải tán team"
      cancel:
        slot: 15
        material: RED_STAINED_GLASS_PANE
        name: "&cHủy"
        lore:
          - "&fHủy bỏ"

  confirm_kick:
    title: "&8Confirm Kick"
    size: 27
    items:
      confirm:
        slot: 11
        material: LIME_STAINED_GLASS_PANE
        name: "&aXác nhận"
        lore:
          - "&fKick {player}"
      cancel:
        slot: 15
        material: RED_STAINED_GLASS_PANE
        name: "&cHủy"
        lore:
          - "&fHủy bỏ"
      player_head:
        slot: 13
        name: "&f{player}"
        lore:
          - "&7{role}"
