
warmup: 5
cancel_distance: 0.1

mysql:
  enabled: false
  host: "host"
  port: 3306
  database: "database"
  username: "username"
  password: "password"
  table-prefix: "ariscore_"
  use-ssl: false

sqlite:
  enabled: true

team:
  max-members: 45
  max-name-length: 16
  min-name-length: 3

sounds:
  click:
    sound: UI_BUTTON_CLICK
    volume: 1.0
    pitch: 1.0
  error:
    sound: ENTITY_VILLAGER_NO
    volume: 1.0
    pitch: 1.0
  success:
    sound: ENTITY_PLAYER_LEVELUP
    volume: 1.0
    pitch: 1.0
  invite:
    sound: ENTITY_EXPERIENCE_ORB_PICKUP
    volume: 1.0
    pitch: 1.2
  teleport:
  countdown:
    sound: BLOCK_NOTE_BLOCK_HAT
    volume: 1.0
    pitch: 1.2
    sound: ENTITY_ENDERMAN_TELEPORT
    volume: 1.0
    pitch: 1.0

